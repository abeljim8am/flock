name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create
        required: true
        default: v26.2.0
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  prepare:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate tag and package version
        id: release
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v26.0.0, got: $RELEASE_TAG" >&2
            exit 1
          fi

          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "flock") | .version')"
          if [[ "$RELEASE_TAG" != "v$version" ]]; then
            echo "Tag $RELEASE_TAG does not match package version $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.flavor }} · ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      ASSET_PREFIX: ${{ matrix.flavor == 'no-web' && 'flock-no-web' || 'flock' }}
    strategy:
      fail-fast: false
      matrix:
        flavor: [default, no-web]
        build: [linux-x64, linux-arm64, macos-x64, macos-arm64, windows-x64]
        include:
          - build: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - build: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - build: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - build: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
          - build: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v7

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }},wasm32-wasip1
          cache: false
          rustflags: ""

      - name: Install NASM
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary
        if: runner.os == 'Linux' && matrix.flavor == 'default'
        run: cargo xtask ci cross ${{ matrix.target }}

      - name: Build release binary without web support
        if: runner.os == 'Linux' && matrix.flavor == 'no-web'
        run: cargo xtask ci cross ${{ matrix.target }} --no-web

      - name: Build macOS release binary
        if: runner.os == 'macOS' && matrix.flavor == 'default'
        run: cargo xtask ci build-release

      - name: Build macOS release binary without web support
        if: runner.os == 'macOS' && matrix.flavor == 'no-web'
        run: cargo xtask ci build-release --no-web

      - name: Build Windows release binary
        if: runner.os == 'Windows' && matrix.flavor == 'default'
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo xtask ci build-release

      - name: Build Windows release binary without web support
        if: runner.os == 'Windows' && matrix.flavor == 'no-web'
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo xtask ci build-release --no-web

      - name: Package Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="$ASSET_PREFIX-${{ matrix.target }}.tar.gz"
          checksum="$ASSET_PREFIX-${{ matrix.target }}.sha256sum"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            binary="target/release/flock"
          else
            binary="target/${{ matrix.target }}/release/flock"
          fi
          tar -czf "$archive" -C "$(dirname "$binary")" flock
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "$binary" > "$checksum"
          else
            sha256sum "$binary" > "$checksum"
          fi

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "$env:ASSET_PREFIX-${{ matrix.target }}.zip"
          $checksum = "$env:ASSET_PREFIX-${{ matrix.target }}.sha256sum"
          Compress-Archive -Path target/release/flock.exe -DestinationPath $archive
          $hash = (Get-FileHash target/release/flock.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  target/release/flock.exe" | Out-File -Encoding ascii $checksum

      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add WixToolset.UI.wixext/6.0.2

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = "$env:ASSET_PREFIX-${{ matrix.target }}-installer.msi"
          $checksum = "$env:ASSET_PREFIX-${{ matrix.target }}-installer.sha256sum"
          New-Item -ItemType Directory -Force -Path target/wix
          wix build wix/main.wxs wix/Zellij.wxl `
            -d Version=$env:RELEASE_VERSION `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -o "target/wix/$installer"
          $hash = (Get-FileHash "target/wix/$installer" -Algorithm SHA256).Hash.ToLower()
          "$hash  $installer" | Out-File -Encoding ascii $checksum

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.flavor }}-${{ matrix.target }}
          compression-level: 0
          if-no-files-found: error
          path: |
            ${{ env.ASSET_PREFIX }}-${{ matrix.target }}.tar.gz
            ${{ env.ASSET_PREFIX }}-${{ matrix.target }}.zip
            ${{ env.ASSET_PREFIX }}-${{ matrix.target }}.sha256sum
            ${{ env.ASSET_PREFIX }}-${{ matrix.target }}-installer.sha256sum
            target/wix/${{ env.ASSET_PREFIX }}-${{ matrix.target }}-installer.msi

  publish:
    name: Publish ${{ needs.prepare.outputs.version }}
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          mapfile -d '' assets < <(find dist -type f -print0)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets were downloaded" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "Flock $RELEASE_TAG" \
              --generate-notes
          fi
